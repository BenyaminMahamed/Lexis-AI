<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lexis — Research Assistant{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080b0f;
            --surface:   #0e1318;
            --surface-2: #131920;
            --border:    #1e2730;
            --border-2:  #2a3540;
            --accent:    #7ee8a2;
            --accent-dim: rgba(126,232,162,0.08);
            --text:      #dde6ee;
            --text-2:    #8a9bb0;
            --text-3:    #4a5a6a;
            --red:       #f87171;
            --yellow:    #fbbf24;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
            --serif: 'Cormorant Garamond', serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.65; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(126,232,162,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(126,232,162,0.012) 1px, transparent 1px); background-size: 44px 44px; pointer-events: none; z-index: 0; }
        nav { position: sticky; top: 0; z-index: 50; background: rgba(8,11,15,0.93); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
        .brand-name { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
        .brand-tag { font-family: var(--mono); font-size: 9px; color: var(--accent); border: 1px solid rgba(126,232,162,0.4); padding: 1px 5px; letter-spacing: 0.12em; text-transform: uppercase; }
        .nav-status { display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2.5s infinite; }
        .status-dot.offline { background: var(--text-3); animation: none; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
        .page { position: relative; z-index: 1; }
        .container { max-width: 1080px; margin: 0 auto; padding: 2.5rem 2rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.5rem 1.1rem; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-2); background: transparent; color: var(--text-2); text-decoration: none; transition: 0.18s ease; white-space: nowrap; }
        .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #0a1a12; font-weight: 500; }
        .btn-primary:hover { background: #92efb5; color: #0a1a12; }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 10px; }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: rgba(248,113,113,0.08); }
        .badge { display: inline-flex; align-items: center; padding: 0.18rem 0.55rem; font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; border: 1px solid var(--border-2); color: var(--text-3); }
        .badge-green { border-color: rgba(126,232,162,0.3); color: var(--accent); background: var(--accent-dim); }
        .badge-yellow { border-color: rgba(251,191,36,0.3); color: var(--yellow); background: rgba(251,191,36,0.05); }
        .alert { padding: 0.85rem 1rem; border-left: 2px solid var(--red); background: rgba(248,113,113,0.06); font-family: var(--mono); font-size: 11px; color: var(--red); margin-bottom: 1.5rem; }
        .demo-banner { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.8rem 1rem; background: rgba(251,191,36,0.04); border: 1px solid rgba(251,191,36,0.18); font-family: var(--mono); font-size: 10px; color: var(--yellow); letter-spacing: 0.04em; margin-bottom: 2rem; line-height: 1.6; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-2); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .animate-in { animation: fadeUp 0.3s ease forwards; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="page">
    <nav>
        <a href="/" class="brand">
            <span class="brand-name">Lexis</span>
            <span class="brand-tag">RAG</span>
        </a>
        <div class="nav-status">
            {% block nav_status %}<div class="status-dot offline"></div><span>DEMO</span>{% endblock %}
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    {% block extra_js %}{% endblock %}
</body>
</html>
